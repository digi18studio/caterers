<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udaipur Caterers — Digital Menu Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Marcellus+SC&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="/data.js"></script>
  <style>
    :root {
      --rose: #B85C74;
      --rose-deep: #7C3A4C;
      --gold: #D8A24B;
      --gold-light: #EFCB8B;
      --cream: #FBF1E9;
      --ivory: #FFFDFB;
      --line: #EFDCD9;
      --text: #3A2A2E;
      --muted: #93807E;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #F5EFEB;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 60px;
    }
    
    .menu-container {
      width: 100%;
      max-width: 840px;
      background: var(--ivory);
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      border-radius: 20px;
      margin: 40px 20px;
      overflow: hidden;
      border: 1px solid var(--line);
      position: relative;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200' viewBox='0 0 300 200'><text x='150' y='100' fill='%237C3A4C' fill-opacity='0.025' font-family='Marcellus SC, serif' font-size='14' font-weight='bold' transform='rotate(-25 150 100)' text-anchor='middle'>UDAIPUR CATERERS</text></svg>");
      background-repeat: repeat;
    }
    
    @media (max-width: 860px) {
      .menu-container {
        margin: 0;
        border-radius: 0;
        border: none;
      }
      body {
        padding-bottom: 0;
      }
    }
    
    /* Header Section */
    .menu-header {
      background: var(--cream);
      padding: 30px;
      border-bottom: 2px solid var(--gold);
      position: relative;
      text-align: center;
    }
    
    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .logo-circle {
      width: 70px;
      height: 70px;
      background: #ffffff;
      border: 2px solid var(--rose);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(184, 92, 116, 0.15);
    }
    
    .logo-circle img {
      width: 48px;
      height: 48px;
    }
    
    .menu-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--rose-deep);
      font-weight: 800;
      margin-top: 10px;
    }
    
    .menu-header .tagline {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 3px;
      font-weight: 600;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .menu-header .tagline::before,
    .menu-header .tagline::after {
      content: "";
      flex-grow: 1;
      height: 1.5px;
      background: var(--gold);
    }
    
    /* Language Toggle */
    .lang-toggle-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      background: var(--rose-deep);
      color: #ffffff;
      border: 1px solid var(--rose);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(124, 58, 76, 0.15);
      transition: all 0.25s ease;
    }
    
    .lang-toggle-btn:hover {
      background: var(--rose);
      transform: translateY(-1px);
    }
    
    @media (max-width: 600px) {
      .lang-toggle-btn {
        position: static;
        margin-top: 15px;
        display: inline-block;
      }
    }
    
    /* Category Filter Bar */
    .filter-bar-wrapper {
      background: var(--ivory);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }
    
    .filter-bar {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      overflow-x: auto;
      scroll-behavior: smooth;
    }
    
    .filter-bar::-webkit-scrollbar {
      height: 4px;
    }
    
    .filter-bar::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 4px;
    }
    
    .filter-btn {
      background: var(--cream);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--rose-deep);
      color: #ffffff;
      border-color: var(--rose-deep);
      transform: translateY(-1px);
    }
    
    /* Menu Content */
    .menu-content {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    
    .category-section {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      background: #ffffff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
      transition: all 0.3s ease;
    }
    
    .category-section:hover {
      box-shadow: 0 8px 24px rgba(124, 58, 76, 0.05);
      border-color: var(--gold-light);
    }
    
    .category-title-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid var(--gold-light);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    
    .category-icon {
      font-size: 24px;
    }
    
    .category-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--rose-deep);
    }
    
    /* Food Items Layout */
    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px 30px;
    }
    
    @media (max-width: 600px) {
      .items-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }
    
    .food-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 14.5px;
      border-bottom: 1px dashed var(--line);
    }
    
    .food-item:last-child {
      border-bottom: none;
    }
    
    .food-emoji {
      font-size: 18px;
    }
    
    .food-name {
      font-weight: 500;
      color: var(--text);
    }
    
    /* Sub-categories styling */
    .subcategory-group {
      margin-bottom: 20px;
    }
    
    .subcategory-group:last-child {
      margin-bottom: 0;
    }
    
    .subcategory-title {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #FFFFFF;
      background: var(--rose-deep);
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      margin-top: 25px;
      display: block;
      width: 100%;
      box-shadow: 0 2px 6px rgba(124, 58, 76, 0.1);
    }
    
    /* Footer Section */
    .menu-footer {
      background: var(--cream);
      padding: 30px 20px;
      border-top: 1px solid var(--line);
      text-align: center;
    }
    
    .footer-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--rose-deep);
      font-weight: 700;
    }
    
    .footer-tagline {
      font-family: 'Poppins', sans-serif;
      font-size: 9px;
      color: var(--gold);
      letter-spacing: 2px;
      font-weight: 600;
      margin-top: 4px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 160px; /* shortened to align with brand title */
      margin-left: auto;
      margin-right: auto;
    }
    .footer-tagline::before,
    .footer-tagline::after {
      content: "";
      flex-grow: 1;
      height: 1.2px;
      background: var(--gold);
    }
    
    .contact-info {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .social-bar {
      background: var(--rose-deep);
      color: #ffffff;
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(124, 58, 76, 0.2);
      transition: all 0.25s ease;
    }
    
    .social-bar:hover {
      background: var(--rose);
      transform: translateY(-1.5px);
    }
    
    .social-bar svg {
      stroke: #ffffff;
    }
    
    .designer-credit {
      font-size: 9.5px;
      color: var(--muted);
      margin-top: 24px;
      opacity: 0.8;
      letter-spacing: 0.5px;
    }

    /* Maroon & White Duotone Filter (solid maroon theme with white outlines/highlights) */
    .food-emoji, .filter-btn-emoji {
      display: inline-block;
      filter: url(#maroon-duotone);
      line-height: 1;
      vertical-align: middle;
      transition: filter 0.2s ease;
    }
    
    /* Invert active/hovered filter pill emoji to white so it stands out on the maroon background */
    .filter-btn.active .filter-btn-emoji,
    .filter-btn:hover .filter-btn-emoji {
      filter: brightness(0) invert(1) !important;
    }
    
    /* Bento Gallery Grid (True CSS Columns Masonry - full aspect ratios preserved) */
    .bento-gallery {
      display: none;
      padding: 30px;
      flex-direction: column;
      gap: 25px;
    }
    .bento-grid {
      display: block;
      column-count: 3;
      column-gap: 15px;
      margin-bottom: 10px;
    }
    @media (max-width: 640px) {
      .bento-grid {
        column-count: 2;
        column-gap: 10px;
      }
      .bento-gallery {
        padding: 20px 15px;
      }
    }
    .bento-item {
      position: relative;
      break-inside: avoid;
      margin-bottom: 15px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid var(--line);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
      display: block;
    }
    .bento-item:hover {
      transform: scale(1.025);
      box-shadow: 0 8px 20px rgba(124, 58, 76, 0.12);
      z-index: 2;
    }
    .bento-item img {
      width: 100%;
      height: auto;
      display: block;
    }
    
    /* Tilted watermark overlay for Category banner covers, Bento items, and Lightbox */
    .image-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      color: rgba(255, 255, 255, 0.22);
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
      z-index: 5;
    }
    
    .image-watermark.mini {
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.18);
    }
    
    .image-watermark.lightbox-watermark {
      font-size: 38px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.16);
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .section-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      color: rgba(124, 58, 76, 0.04);
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      z-index: 1;
    }

    /* Fullscreen Lightbox Modal */
    .lightbox-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 18, 20, 0.95);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .lightbox-content-wrapper {
      position: relative;
      width: 90%;
      max-width: 900px;
      height: 80%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ffffff;
      font-size: 38px;
      font-weight: 300;
      cursor: pointer;
      z-index: 1010;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transition: background 0.2s;
    }
    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1005;
      transition: background 0.2s;
    }
    .lightbox-nav:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .lightbox-nav.prev {
      left: 20px;
    }
    .lightbox-nav.next {
      right: 20px;
    }
    @media (max-width: 768px) {
      .lightbox-nav {
        width: 40px;
        height: 40px;
        font-size: 24px;
      }
      .lightbox-nav.prev { left: 10px; }
      .lightbox-nav.next { right: 10px; }
      .lightbox-close {
        top: 15px;
        right: 15px;
        width: 36px;
        height: 36px;
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- SVG Duotone Filter mapping grayscale to solid maroon (#7C3A4C) and highlights to white -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <filter id="maroon-duotone" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0
                                           0.33 0.33 0.33 0 0
                                           0.33 0.33 0.33 0 0
                                           0    0    0    1 0" result="gray"/>
      <feComponentTransfer in="gray">
        <feFuncR type="table" tableValues="0.486 0.486 0.486 0.95 1" />
        <feFuncG type="table" tableValues="0.227 0.227 0.227 0.95 1" />
        <feFuncB type="table" tableValues="0.298 0.298 0.298 0.95 1" />
      </feComponentTransfer>
    </filter>
  </svg>

  <div class="menu-container">
    
    <!-- Header -->
    <header class="menu-header">
      <button class="lang-toggle-btn" id="langToggle">English</button>
      <div class="logo-wrapper">
        <div class="logo-circle">
          <img src="/assets/Logo/chef-svgrepo-color.svg" alt="Chef Logo">
        </div>
        <h1>Udaipur Caterers</h1>
        <div class="tagline">SWAAD KA WAADA</div>
      </div>
    </header>
    
    <!-- Sticky Category Filter Bar -->
    <div class="filter-bar-wrapper">
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">🌟 <span class="lbl-all">All Items</span></button>
      </div>
      <div class="filter-bar" id="setupFilterBar" style="border-top: 1px solid var(--line); padding: 10px 20px;">
        <!-- Setup buttons loaded dynamically -->
      </div>
    </div>
    
    <!-- Menu Content -->
    <main class="menu-content" id="menuContent">
      <!-- Categories and items will be loaded dynamically here -->
    </main>

    <!-- Bento Setup Gallery Content -->
    <main class="bento-gallery" id="bentoGallery">
      <!-- Setup sections & Bento grids will be loaded dynamically here -->
    </main>
    
    <!-- Footer -->
    <footer class="menu-footer">
      <div class="footer-brand">Udaipur Caterers</div>
      <div class="footer-tagline">SWAAD KA WAADA</div>
      <div class="contact-info">
        <strong>Udaipur Caterers</strong><br>
        Near Lake Pichola, Udaipur, Rajasthan<br>
        Contact: +91 94140 XXXXX | Email: info@udaipurcaterers.com
      </div>
      <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
        <a href="https://instagram.com/udaipur_caterers" target="_blank" class="social-bar">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle;">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
          <span>@udaipur_caterers</span>
        </a>
        <a href="https://wa.me/9194140XXXXX" target="_blank" class="social-bar" style="background:#25D366; box-shadow:0 4px 12px rgba(37,211,102,0.2);">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle;">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
          </svg>
          <span>Chat with Harshit</span>
        </a>
        <a href="tel:+9194140XXXXX" class="social-bar" style="background:var(--gold); box-shadow:0 4px 12px rgba(216,162,75,0.2);">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle;">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <span>Call to Harshit</span>
        </a>
      </div>
      <div class="designer-credit">
        Design by: Harshit Seth &bull; Digi18Studio
      </div>
    </footer>
    
  </div>

  <!-- Lightbox Modal -->
  <div class="lightbox-modal" id="lightboxModal">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <div class="lightbox-nav prev" id="lightboxPrev">&#10094;</div>
    <div class="lightbox-content-wrapper" style="position: relative;">
      <img class="lightbox-img" id="lightboxImg" src="">
      <div class="image-watermark lightbox-watermark">Udaipur Caterers</div>
    </div>
    <div class="lightbox-nav next" id="lightboxNext">&#10095;</div>
  </div>

  <script>
    const CATEGORY_SVGS = {
      breakfast: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <path d="M6 1v3M10 1v3M14 1v3"/>
      </svg>`,
      soup: '/assets/Icons/icon_soup.svg',
      sabji: '/assets/Icons/icon_main-course-sabji.svg',
      roti: '/assets/Icons/icon_roti.svg',
      pulav: '/assets/Icons/icon_pulav.svg',
      punjabi: '/assets/Icons/icon_punjabi.svg',
      south: '/assets/Icons/icon_south-indian.svg',
      rajasthani: '/assets/Icons/icon_rajasthani.svg',
      liveSabji: '/assets/Icons/icon_main-course-live sabjiya.svg',
      live: '/assets/Icons/icon_extra-counter-live.svg',
      mithai: '/assets/Icons/icon_mithai.svg',
      drinks: '/assets/Icons/icon_mocktails.svg',
      mahilaSangeet: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>`,
      funcSpecial: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8h12M4 8c0 5 3 9 8 9s8-4 8-9H4z"/>
        <path d="M8 5v3M12 4v4M16 5v3"/>
        <circle cx="12" cy="13" r="1.5"/>
      </svg>`,

    function getCategoryIconHtml(key, fallbackEmoji, extraClass = 'filter-btn-emoji') {
      const svg = CATEGORY_SVGS[key];
      if (!svg) return `<span class="${extraClass}">${fallbackEmoji}</span>`;
      if (svg.startsWith('/') || svg.startsWith('./')) {
        return `<img src="${svg}" class="${extraClass}" style="width:18px; height:18px; display:inline-block; vertical-align:middle; object-fit:contain;" alt="${key}">`;
      }
      return `<span class="${extraClass}" style="width:18px; height:18px; display:inline-block; vertical-align:middle; line-height:1;">${svg}</span>`;

    // State management

    // 1. Dynamic category and item adjustments for Digital Menu Card only
    (function adjustMenuData() {
      // Add Jalebi to Mithai
      const mithaiCat = window.FOOD_CATEGORIES.find(c => c.key === 'mithai');

          mithaiCat.items.unshift(['Jalebi', '🥨']);

      // Add Fruit Chaat and correct Fresh Fruits translation in Fruits Counter

    // Dictionary helper
    const LANG_TEXTS = {

        funcSpecial: "पारंपरिक भोजन",
        paan: "पान और मुखवास",
        fruits: "ताज़ा फल काउंटर"
      }

    function txt(key) {
      return LANG_TEXTS[state.lang][key] || key;
    }

    function translateFoodItem(name) {
      const isEn = (state.lang === 'en');
      const mapped = window.FOOD_TRANSLATIONS[name];
      if (!mapped) return name;
      const isHindi = /[\u0900-\u097F]/.test(name);
      if (isEn) {
        return isHindi ? mapped : name;
      } else {
        return !isHindi ? mapped : name;
      }
    }

    // Flag emoji rendering helper
    function renderEmojiHtml(emoji) {
      const flagRegex = /[\uD83C][\uDDE6-\uDDFF][\uD83C][\uDDE6-\uDDFF]/;
      if (flagRegex.test(emoji)) {
        const codePoints = Array.from(emoji).map(c => c.codePointAt(0).toString(16));
        const url = `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${codePoints.join('-')}.svg`;
        return `<img src="${url}" class="flag-emoji" alt="${emoji}">`;
      }
      return `<span class="food-emoji">${emoji || '🍽️'}</span>`;
    }

    // Dynamic Categories and Items rendering
    function renderMenu() {
      // 1. Update static labels
      document.getElementById('langToggle').innerHTML = state.lang === 'en' ? 'हिंदी' : 'English';
      
      // 2. Render category filter bar buttons
      const filterBar = document.getElementById('filterBar');
      filterBar.innerHTML = '';
      
      const allBtn = document.createElement('button');
      allBtn.className = `filter-btn ${state.activeSetup === null && state.activeCategory === 'all' ? 'active' : ''}`;
      allBtn.dataset.filter = 'all';
      allBtn.innerHTML = `<span class="filter-btn-emoji">🌟</span> <span>${txt('all_items')}</span>`;
      allBtn.onclick = () => selectFilter('all');
      filterBar.appendChild(allBtn);
      
      window.FOOD_CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${state.activeSetup === null && state.activeCategory === cat.key ? 'active' : ''}`;
        btn.dataset.filter = cat.key;
        btn.innerHTML = `${getCategoryIconHtml(cat.key, cat.icon, 'filter-btn-emoji')} <span>${txt(cat.key) || cat.title}</span>`;
        btn.onclick = () => selectFilter(cat.key);
        filterBar.appendChild(btn);
      });

      // 3. Render setup filter bar buttons
      const setupFilterBar = document.getElementById('setupFilterBar');
      setupFilterBar.innerHTML = '';
      
      SETUP_CATEGORIES.forEach(setup => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${state.activeSetup === setup.key ? 'active' : ''}`;
        btn.dataset.setup = setup.key;
        const label = state.lang === 'en' ? setup.title : setup.titleHi;
        btn.innerHTML = `<span class="filter-btn-emoji">${setup.icon}</span> <span>${label}</span>`;
        btn.onclick = () => selectSetup(setup.key);
        setupFilterBar.appendChild(btn);
      });

      const menuContent = document.getElementById('menuContent');
      const bentoGallery = document.getElementById('bentoGallery');

      // 4. Toggle Content visibility
      if (state.activeSetup !== null) {
        menuContent.style.display = 'none';
        bentoGallery.style.display = 'flex';
        renderBentoGallery();
      } else {
        menuContent.style.display = 'flex';
        bentoGallery.style.display = 'none';
        renderFoodMenu();
      }
    }

    function renderFoodMenu() {
      const menuContent = document.getElementById('menuContent');
      menuContent.innerHTML = '';
      const activeFilter = state.activeCategory;

      window.FOOD_CATEGORIES.forEach(cat => {
        if (activeFilter !== 'all' && activeFilter !== cat.key) return;

        const section = document.createElement('section');
        section.className = 'category-section';
        section.id = `cat-${cat.key}`;

        const header = document.createElement('div');
        header.className = 'category-banner-wrapper';
        header.style.width = '100%';
        header.style.background = 'transparent';
        header.style.border = 'none';
        header.style.display = 'flex';
        header.style.flexDirection = 'column';
        header.style.gap = '8px';
        header.style.marginBottom = '20px';
        
        const coverUrl = window.getCategoryBanner(cat.key);
        header.innerHTML = `
          <div style="background: var(--rose-deep); color: #FFFFFF; padding: 10px 16px; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; border-radius: 12px; box-shadow: 0 2px 6px rgba(124,58,76,0.15);">
            ${getCategoryIconHtml(cat.key, cat.icon, 'white-emoji')}
            <span>${txt(cat.key) || cat.title}</span>
          </div>
          <div style="width: 100%; height: 180px; overflow: hidden; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid var(--line); position: relative;">
            <img src="${coverUrl}" style="width: 100%; height: 100%; object-fit: cover; display: block;" />
            <div class="image-watermark">Udaipur Caterers</div>
          </div>
        `;
        section.appendChild(header);

        const hasSub = cat.items.some(item => !Array.isArray(item) && item && typeof item === 'object' && item.sub);

        if (hasSub) {
          let currentFlatItems = [];
          cat.items.forEach(group => {
            if (Array.isArray(group)) {
              currentFlatItems.push(group);
            } else if (group && typeof group === 'object' && group.sub) {
              if (currentFlatItems.length > 0) {
                const grid = document.createElement('div');
                grid.className = 'items-grid';
                grid.style.marginBottom = '20px';
                currentFlatItems.forEach(flatItem => {
                  const el = document.createElement('div');
                  el.className = 'food-item';
                  el.innerHTML = `${renderEmojiHtml(flatItem[1])}<span class="food-name">${translateFoodItem(flatItem[0])}</span>`;
                  grid.appendChild(el);
                });
                section.appendChild(grid);
                currentFlatItems = [];
              }
              const subGroup = document.createElement('div');
              subGroup.className = 'subcategory-group';
              const subTitle = document.createElement('div');
              subTitle.className = 'subcategory-title';
              subTitle.innerHTML = `<span>${group.sub}</span>`;
              subGroup.appendChild(subTitle);
              const grid = document.createElement('div');
              grid.className = 'items-grid';
              group.items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'food-item';
                el.innerHTML = `${renderEmojiHtml(item[1])}<span class="food-name">${translateFoodItem(item[0])}</span>`;
                grid.appendChild(el);
              });
              subGroup.appendChild(grid);
              section.appendChild(subGroup);
            }
          });
          if (currentFlatItems.length > 0) {
            const grid = document.createElement('div');
            grid.className = 'items-grid';
            currentFlatItems.forEach(flatItem => {
              const el = document.createElement('div');
              el.className = 'food-item';
              el.innerHTML = `${renderEmojiHtml(flatItem[1])}<span class="food-name">${translateFoodItem(flatItem[0])}</span>`;
              grid.appendChild(el);
            });
            section.appendChild(grid);
          }
        } else {
          const grid = document.createElement('div');
          grid.className = 'items-grid';
          cat.items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'food-item';
            el.innerHTML = `${renderEmojiHtml(item[1])}<span class="food-name">${translateFoodItem(item[0])}</span>`;
            grid.appendChild(el);
          });
          section.appendChild(grid);
        }
        const sectionWatermark = document.createElement('div');
        sectionWatermark.className = 'section-watermark';
        sectionWatermark.textContent = 'Udaipur Caterers';
        section.appendChild(sectionWatermark);
        
        menuContent.appendChild(section);
      });
    }

    function renderBentoGallery() {
      const bentoGallery = document.getElementById('bentoGallery');
      bentoGallery.innerHTML = '';
      const allVisibleImages = [];
      
      const setupsToRender = (state.activeSetup === 'all') 
        ? SETUP_CATEGORIES.filter(s => s.key !== 'all') 
        : SETUP_CATEGORIES.filter(s => s.key === state.activeSetup);

      setupsToRender.forEach(setup => {
        const title = document.createElement('div');
        title.className = 'subcategory-title';
        title.style.marginTop = '15px';
        title.innerHTML = `<span>${state.lang === 'en' ? setup.title : setup.titleHi}</span>`;
        bentoGallery.appendChild(title);
        
        const grid = document.createElement('div');
        grid.className = 'bento-grid';
        setup.imgs.forEach((imgSrc) => {
          allVisibleImages.push(imgSrc);
          const item = document.createElement('div');
          item.className = 'bento-item';
          item.innerHTML = `
            <img src="${imgSrc}" alt="${setup.title}" loading="lazy">
            <div class="image-watermark mini">Udaipur Caterers</div>
          `;
          item.onclick = () => openLightbox(imgSrc, allVisibleImages);
          grid.appendChild(item);
        });
        bentoGallery.appendChild(grid);
      });
    }

    function selectFilter(filterKey) {
      state.activeCategory = filterKey;
      state.activeSetup = null;
      renderMenu();
      const activeBtn = document.querySelector(`#filterBar .filter-btn[data-filter="${filterKey}"]`);
      if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function selectSetup(setupKey) {
      state.activeSetup = setupKey;
      renderMenu();
      const activeBtn = document.querySelector(`#setupFilterBar .filter-btn[data-setup="${setupKey}"]`);
      if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    let currentGalleryImages = [];
    let currentImageIndex = 0;

    function openLightbox(imgSrc, allImages) {
      currentGalleryImages = allImages;
      currentImageIndex = allImages.indexOf(imgSrc);
      document.getElementById('lightboxImg').src = imgSrc;
      document.getElementById('lightboxModal').style.display = 'flex';
      history.pushState({ lightbox: true }, '');
    }

    function closeLightbox() {
      document.getElementById('lightboxModal').style.display = 'none';
      if (history.state && history.state.lightbox) history.back();
    }

    function navigateLightbox(dir) {
      if (currentGalleryImages.length <= 1) return;
      currentImageIndex = (currentImageIndex + dir + currentGalleryImages.length) % currentGalleryImages.length;
      const img = document.getElementById('lightboxImg');
      img.style.transform = 'scale(0.95)';
      setTimeout(() => {
        img.src = currentGalleryImages[currentImageIndex];
        img.style.transform = 'scale(1)';
      }, 100);
    }

    document.getElementById('lightboxClose').onclick = closeLightbox;
    document.getElementById('lightboxPrev').onclick = () => navigateLightbox(-1);
    document.getElementById('lightboxNext').onclick = () => navigateLightbox(1);
    
    window.addEventListener('keydown', (e) => {
      if (document.getElementById('lightboxModal').style.display === 'flex') {
        if (e.key === 'ArrowRight') navigateLightbox(1);
        if (e.key === 'ArrowLeft') navigateLightbox(-1);
        if (e.key === 'Escape') closeLightbox();
      }
    });

    window.addEventListener('popstate', () => {
      document.getElementById('lightboxModal').style.display = 'none';
    });

    // Swipe gestures
    let touchStartX = 0;
    let touchEndX = 0;
    const lightboxModal = document.getElementById('lightboxModal');
    lightboxModal.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});
    lightboxModal.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const threshold = 50;
      if (touchEndX < touchStartX - threshold) navigateLightbox(1); // Swipe Left
      if (touchEndX > touchStartX + threshold) navigateLightbox(-1); // Swipe Right
    }, {passive: true});

    // Close on background click
    lightboxModal.onclick = (e) => {
      if (e.target.id === 'lightboxModal' || e.target.classList.contains('lightbox-content-wrapper')) {
        closeLightbox();
      }
    };

    document.getElementById('langToggle').onclick = () => {
      state.lang = state.lang === 'en' ? 'hi' : 'en';
      renderMenu();
    };

    renderMenu();
  </script>
